apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: react-app
          image: dnyaneshwar535/simple-react-app:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "10m"